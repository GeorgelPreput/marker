workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - check
  - update
  - build
  - manifest

variables:
  DOCKER_IMAGE: georgelpreput/marker
  PYPI_PACKAGE: marker-pdf
  MARKER_REPO: datalab-to/marker

# ── Release check (schedule / manual only) ───────────────────────────────────
# Checks PyPI for a newer marker-pdf release. If found, also looks up the
# surya-ocr version that release pins in its upstream pyproject.toml, and
# verifies that surya-ocr version is actually published on PyPI. Only when
# both pieces line up do we proceed with the bump.
# Passes UPDATE_NEEDED, NEW_MARKER_VERSION, and NEW_SURYA_VERSION to the next
# stage via dotenv artifact.

check-release:
  stage: check
  image: alpine:latest
  tags: [arm64]
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  before_script:
    - apk add --no-cache curl jq
  script:
    - echo "UPDATE_NEEDED=false" > check.env
    - PYPI_MARKER_VERSION=$(curl -fsSL https://pypi.org/pypi/$PYPI_PACKAGE/json | jq -r '.info.version')
    - CURRENT_MARKER_VERSION=$(sed -n 's/^version = "\([^"]*\)".*/\1/p' pyproject-cpu.toml)
    - echo "marker-pdf  PyPI=$PYPI_MARKER_VERSION  Current=$CURRENT_MARKER_VERSION"
    - |
      if [ -z "$PYPI_MARKER_VERSION" ] || [ "$PYPI_MARKER_VERSION" = "$CURRENT_MARKER_VERSION" ]; then
        echo "marker-pdf is already on the latest published version. Nothing to do."
        cat check.env
        exit 0
      fi
    # Look up the surya-ocr version pinned by marker at the new release tag.
    - MARKER_PYPROJECT_URL="https://raw.githubusercontent.com/${MARKER_REPO}/v${PYPI_MARKER_VERSION}/pyproject.toml"
    - echo "Fetching $MARKER_PYPROJECT_URL"
    - |
      REQUIRED_SURYA_VERSION=$(curl -fsSL "$MARKER_PYPROJECT_URL" \
        | grep -E '^[[:space:]]*surya-ocr[[:space:]]*=' \
        | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' \
        | head -n1)
    - |
      if [ -z "$REQUIRED_SURYA_VERSION" ]; then
        echo "Could not determine required surya-ocr version from marker v${PYPI_MARKER_VERSION}. Skipping update."
        cat check.env
        exit 0
      fi
    - echo "marker v${PYPI_MARKER_VERSION} requires surya-ocr ${REQUIRED_SURYA_VERSION}"
    # Confirm that exact surya-ocr version is published on PyPI.
    - SURYA_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/surya-ocr/${REQUIRED_SURYA_VERSION}/json")
    - |
      if [ "$SURYA_STATUS" != "200" ]; then
        echo "surya-ocr==${REQUIRED_SURYA_VERSION} not yet on PyPI (HTTP $SURYA_STATUS). Treating as nothing to update."
        cat check.env
        exit 0
      fi
    - echo "UPDATE_NEEDED=true" > check.env
    - echo "NEW_MARKER_VERSION=$PYPI_MARKER_VERSION" >> check.env
    - echo "NEW_SURYA_VERSION=$REQUIRED_SURYA_VERSION" >> check.env
    - cat check.env
  artifacts:
    reports:
      dotenv: check.env
    expire_in: 1 hour

# ── Version bump (schedule / manual only) ────────────────────────────────────
# If a new release was found, bumps both pyproject toml files, commits, and
# pushes to main — which triggers a fresh push pipeline to build the images.
# Requires a GITLAB_TOKEN CI/CD variable with repository write access.

update-versions:
  stage: update
  tags: [arm64]
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - job: check-release
      artifacts: true
  script:
    - |
      if [ "$UPDATE_NEEDED" != "true" ]; then
        echo "Nothing to update."
        exit 0
      fi
    - echo "Bumping marker-pdf to $NEW_MARKER_VERSION, surya-ocr to $NEW_SURYA_VERSION"
    - |
      for f in pyproject-cpu.toml pyproject-gpu.toml; do
        sed -i -E "s/^version = \"[0-9]+\.[0-9]+\.[0-9]+\"/version = \"$NEW_MARKER_VERSION\"/" "$f"
        sed -i -E "s/(marker-pdf\[[^]]*\])==[0-9]+\.[0-9]+\.[0-9]+/\1==$NEW_MARKER_VERSION/" "$f"
        sed -i -E "s/surya-ocr==[0-9]+\.[0-9]+\.[0-9]+/surya-ocr==$NEW_SURYA_VERSION/" "$f"
      done
    - git config user.name "gitlab-ci[bot]"
    - git config user.email "gitlab-ci[bot]@noreply.local"
    - git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git add pyproject-cpu.toml pyproject-gpu.toml
    - |
      git diff --cached --quiet && echo "Nothing changed, skipping commit." || (
        git commit -m "chore: Update marker-pdf to $NEW_MARKER_VERSION and surya-ocr to $NEW_SURYA_VERSION" &&
        git push origin HEAD:$CI_DEFAULT_BRANCH
      )

# ── Docker builds (push to main only) ────────────────────────────────────────
# Each job builds for its native architecture and pushes an arch-tagged
# intermediate image. The manifest stage combines them into multi-arch tags.
# Note: Dockerfile.gpu contains a hardcoded x86_64 CUDA keyring URL —
# the arm64 GPU build will fail until that URL is updated for aarch64.

.build-base: &build-base
  image: docker:latest
  timeout: 4h
  before_script:
    - echo "$REGISTRY_TOKEN" | docker login --username georgelpreput --password-stdin
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build:gpu:amd64:
  <<: *build-base
  stage: build
  tags: [amd64]
  script:
    - VERSION=v$(sed -n 's/^version = "\([^"]*\)".*/\1/p' pyproject-gpu.toml)
    - docker build --no-cache --provenance=false --platform linux/amd64 -t $DOCKER_IMAGE:${VERSION}-gpu-amd64 -f Dockerfile.gpu-amd64 .
    - docker push $DOCKER_IMAGE:${VERSION}-gpu-amd64

build:cpu:amd64:
  <<: *build-base
  stage: build
  tags: [amd64]
  needs: [build:gpu:amd64]
  script:
    - VERSION=v$(sed -n 's/^version = "\([^"]*\)".*/\1/p' pyproject-cpu.toml)
    - docker build --no-cache --provenance=false --platform linux/amd64 -t $DOCKER_IMAGE:${VERSION}-cpu-amd64 -f Dockerfile.cpu-amd64 .
    - docker push $DOCKER_IMAGE:${VERSION}-cpu-amd64

build:gpu:arm64:
  <<: *build-base
  stage: build
  tags: [arm64]
  needs: []
  script:
    - VERSION=v$(sed -n 's/^version = "\([^"]*\)".*/\1/p' pyproject-gpu.toml)
    - docker build --no-cache --provenance=false --platform linux/arm64 -t $DOCKER_IMAGE:${VERSION}-gpu-arm64 -f Dockerfile.gpu-arm64 .
    - docker push $DOCKER_IMAGE:${VERSION}-gpu-arm64

build:cpu:arm64:
  <<: *build-base
  stage: build
  tags: [arm64]
  needs: [build:gpu:arm64]
  script:
    - VERSION=v$(sed -n 's/^version = "\([^"]*\)".*/\1/p' pyproject-cpu.toml)
    - docker build --no-cache --provenance=false --platform linux/arm64 -t $DOCKER_IMAGE:${VERSION}-cpu-arm64 -f Dockerfile.cpu-arm64 .
    - docker push $DOCKER_IMAGE:${VERSION}-cpu-arm64

build:tegra:arm64:
  <<: *build-base
  stage: build
  tags: [arm64]
  needs: [build:cpu:arm64]
  script:
    - VERSION=v$(sed -n 's/^version = "\([^"]*\)".*/\1/p' pyproject-gpu.toml)
    - docker build --no-cache --provenance=false --platform linux/arm64 -t $DOCKER_IMAGE:${VERSION}-tegra-arm64 -f Dockerfile.tegra-arm64 .
    - docker push $DOCKER_IMAGE:${VERSION}-tegra-arm64

# ── Multi-arch manifests ──────────────────────────────────────────────────────
# Combines the arch-specific images into multi-arch manifest lists.
# Final tags (no arch suffix): v1.x.y-cpu, v1.x.y-gpu, latest-cpu, latest-gpu, latest
# Tegra is arm64-only: v1.x.y-tegra, latest-tegra

manifest:cpu:
  <<: *build-base
  stage: manifest
  tags: [arm64]
  needs: [build:cpu:arm64, build:cpu:amd64]
  script:
    - VERSION=v$(sed -n 's/^version = "\([^"]*\)".*/\1/p' pyproject-cpu.toml)
    - ARM64=$DOCKER_IMAGE:${VERSION}-cpu-arm64
    - AMD64=$DOCKER_IMAGE:${VERSION}-cpu-amd64
    - |
      for TAG in $DOCKER_IMAGE:${VERSION}-cpu $DOCKER_IMAGE:latest-cpu $DOCKER_IMAGE:latest; do
        docker manifest rm $TAG 2>/dev/null || true
        docker manifest create $TAG $ARM64 $AMD64
        docker manifest push $TAG
      done

manifest:gpu:
  <<: *build-base
  stage: manifest
  tags: [arm64]
  needs: [build:gpu:arm64, build:gpu:amd64]
  script:
    - VERSION=v$(sed -n 's/^version = "\([^"]*\)".*/\1/p' pyproject-gpu.toml)
    - ARM64=$DOCKER_IMAGE:${VERSION}-gpu-arm64
    - AMD64=$DOCKER_IMAGE:${VERSION}-gpu-amd64
    - |
      for TAG in $DOCKER_IMAGE:${VERSION}-gpu $DOCKER_IMAGE:latest-gpu; do
        docker manifest rm $TAG 2>/dev/null || true
        docker manifest create $TAG $ARM64 $AMD64
        docker manifest push $TAG
      done

manifest:tegra:
  <<: *build-base
  stage: manifest
  tags: [arm64]
  needs: [build:tegra:arm64]
  script:
    - VERSION=v$(sed -n 's/^version = "\([^"]*\)".*/\1/p' pyproject-gpu.toml)
    - ARM64=$DOCKER_IMAGE:${VERSION}-tegra-arm64
    - |
      for TAG in $DOCKER_IMAGE:${VERSION}-tegra $DOCKER_IMAGE:latest-tegra; do
        docker manifest rm $TAG 2>/dev/null || true
        docker manifest create $TAG $ARM64
        docker manifest push $TAG
      done

pushrm:
  image:
    name: chko/docker-pushrm:1
    entrypoint: ["/bin/sh", "-c", "/docker-pushrm"]
  stage: manifest
  tags: [arm64]
  needs: [manifest:cpu, manifest:gpu, manifest:tegra]
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  variables:
    DOCKER_USER: georgelpreput
    DOCKER_PASS: $REGISTRY_TOKEN
    PUSHRM_SHORT: "Docker image for Marker document conversion service"
    PUSHRM_TARGET: docker.io/georgelpreput/marker
    PUSHRM_FILE: $CI_PROJECT_DIR/README.md
  script: /bin/true

mirror:github:
  image:
    name: alpine/git:latest
    entrypoint: [""]
  stage: manifest
  tags: [arm64]
  needs: [pushrm]
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  variables:
    GIT_DEPTH: 0
  script:
    - git remote add github "https://GeorgelPreput:${GITHUB_TOKEN}@github.com/GeorgelPreput/marker.git"
    - git push github "HEAD:refs/heads/$CI_DEFAULT_BRANCH"
